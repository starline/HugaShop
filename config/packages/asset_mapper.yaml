framework:
    asset_mapper:
        # The paths to make available to the asset mapper.
        paths:
            - assets/
            - templates/
        missing_import_mode: strict
        excluded_patterns:
            - "**tinymce**"
            - "**/*.tpl"
            - "**/translations/**"

when@prod:
    framework:
        asset_mapper:
            missing_import_mode: warn
